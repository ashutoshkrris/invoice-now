name: Bug Report
description: Report a reproducible bug in Invoice Now.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Before submitting:
        - Search existing issues to avoid duplicates.
        - Make sure you're using the latest version of the project.
        - Include enough information for us to reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clearly describe what happened.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Brave
        - Other

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: "138"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11, macOS 15, Ubuntu 24.04...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen recordings
      description: Drag and drop images or videos here.

  - type: textarea
    id: additional
    attributes:
      label: Additional context