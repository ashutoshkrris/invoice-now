name: Bug Report
description: Report a reproducible bug in Invoice Now.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Before submitting:
        - Search existing issues to avoid duplicates.
        - Make sure you're using the latest version of the project.
        - Include enough information for us to reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: |
        Example:
        When I click "Generate Invoice", the page freezes and no invoice is created.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Tell us how we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Enter ...
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: |
        Example:
        The invoice should be generated successfully.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Optional.
      placeholder: |
        You can include:
        - Error messages
        - Screenshots or screen recordings
        - Browser or operating system (if you think it's relevant)
        - Anything else that might help us investigate