name: Feature Request
description: Suggest an improvement or a new feature for Invoice Now.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion!

        Before submitting:
        - Search existing issues to avoid duplicates.
        - Explain the problem you're trying to solve, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Tell us what is difficult, confusing, or missing today.
      placeholder: |
        Example:
        I create invoices for recurring clients every month, but I have to manually recreate them each time.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution.
      placeholder: |
        Example:
        Add invoice templates or recurring invoices so I can generate them with one click.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Have you considered any alternatives?
      description: Optional.
      placeholder: |
        Example:
        I currently duplicate old invoices, but it's time-consuming and easy to miss changes.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Optional.
      placeholder: |
        You can include:
        - Mockups or sketches
        - Screenshots
        - Links to similar implementations
        - Anything else that helps explain the idea

  - type: dropdown
    id: willing
    attributes:
      label: Interested in contributing?
      description: Would you like to work on this feature?
      options:
        - "Yes"
        - "Maybe"
        - "No"